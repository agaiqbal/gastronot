version: '3.9'

services:
  gastronot:
    build: .
    container_name: gastronot_app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - ADMIN_TOKEN=${ADMIN_TOKEN:-gastronot-secret-change-me}
    volumes:
      # Persist CMS data across deploys
      - gastronot_data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  gastronot_data:
    driver: local
