  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

etter-spacing:0.5px;margin-bottom:8px;\">GAMBAR 2<\u002Fdiv>\n            <image-slot id=\"hero-img-2\" placeholder=\"Drop image\" shape=\"rect\" style=\"width:100%;aspect-ratio:4/3;display:block;border-radius:10px;overflow:hidden;\"><\u002Fimage-slot>\n          <\u002Fdiv>\n          <div>\n            <div style=\"font-size:10px;font-weight:600;color:rgba(163,156,181,0.6);font-family:'Space Grotesk';letter-spacing:0.5px;margin-bottom:8px;\">GAMBAR 3<\u002Fdiv>\n            <image-slot id=\"hero-img-3\" placeholder=\"Drop image\" shape=\"rect\" style=\"width:100%;aspect-ratio:4/3;display:block;border-radius:10px;overflow:hidden;\"><\u002Fimage-slot>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"margin-top:12px;padding:10px 14px;background:rgba(23,235,212,0.06);border:1px solid rgba(23,235,212,0.15);border-radius:10px;font-size:11px;color:rgba(23,235,212,0.7);font-family:'Space Grotesk';\">\n          💡 Gambar langsung ter-sync dengan website. Drag &amp; drop file ke slot di atas.\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ══ PARTNER LOGOS (dynamic) ══ -->\n    <div id=\"cms-partner-logos\" class=\"adm-card\">\n      <div class=\"adm-card-header\">\n        <div style=\"display:flex;align-items:center;gap:10px;\">\n          <div class=\"adm-card-icon\" style=\"background:rgba(23,235,212,0.12);\"><svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#17ebd4\" stroke-width=\"2.5\"><rect x=\"3\" y=\"3\" width=\"18\" height=\"18\" rx=\"2\"><\u002Frect><circle cx=\"8.5\" cy=\"8.5\" r=\"1.5\"><\u002Fcircle><polyline points=\"21 15 16 10 5 21\"><\u002Fpolyline><\u002Fsvg><\u002Fdiv>\n          <div><div style=\"font-family:'Space Grotesk';font-size:14px;font-weight:700;color:#fff;\">Partner Logos<\u002Fdiv><div style=\"font-size:10px;color:rgba(255,255,255,0.3);margin-top:1px;\" id=\"partner-count\">6 logos<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <button id=\"add-partner-btn\" style=\"display:flex;align-items:center;gap:6px;background:rgba(94,23,235,0.12);border:1px solid rgba(94,23,235,0.3);border-radius:9px;padding:7px 14px;cursor:pointer;font-family:'Space Grotesk';font-size:11px;font-weight:600;color:#5e17eb;transition:all 0.2s;\" style-hover=\"background:rgba(94,23,235,0.22);\">\n          <svg width=\"11\" height=\"11\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"3\"><line x1=\"12\" y1=\"5\" x2=\"12\" y2=\"19\"><\u002Fline><line x1=\"5\" y1=\"12\" x2=\"19\" y2=\"12\"><\u002Fline><\u002Fsvg>\n          Add Logo\n        <\u002Fbutton>\n      <\u002Fdiv>\n      <div class=\"adm-card-body\">\n        <div id=\"partner-logos-list\" style=\"display:flex;flex-direction:column;gap:8px;\"><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ══ CLIENT LOGOS (dynamic) ══ -->\n    <div id=\"cms-client-logos\" class=\"adm-card\" style=\"margin-bottom:48px;\">\n      <div class=\"adm-card-header\">\n        <div style=\"display:flex;align-items:center;gap:10px;\">\n          <div class=\"adm-card-icon\" style=\"background:rgba(23,235,212,0.12);\"><svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#17ebd4\" stroke-width=\"2.5\"><rect x=\"3\" y=\"3\" width=\"18\" height=\"18\" rx=\"2\"><\u002Frect><circle cx=\"8.5\" cy=\"8.5\" r=\"1.5\"><\u002Fcircle><polyline points=\"21 15 16 10 5 21\"><\u002Fpolyline><\u002Fsvg><\u002Fdiv>\n          <div><div style=\"font-family:'Space Grotesk';font-size:14px;font-weight:700;color:#fff;\">Client Logos<\u002Fdiv><div style=\"font-size:10px;color:rgba(255,255,255,0.3);margin-top:1px;\" id=\"client-count\">21 logos<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <button id=\"add-client-btn\" style=\"display:flex;align-items:center;gap:6px;background:rgba(94,23,235,0.12);border:1px solid rgba(94,23,235,0.3);border-radius:9px;padding:7px 14px;cursor:pointer;font-family:'Space Grotesk';font-size:11px;font-weight:600;color:#5e17eb;transition:all 0.2s;\" style-hove pment','cap1-sub':'Web · Software · Mobile','cap2-title':'AI Enablement','cap2-sub':'Chatbots · Automation · Insights',\n        'cap3-title':'Cyber Security','cap3-sub':'Endpoint · Network · Cloud','cap4-title':'Growth & Marketing','cap4-sub':'Brand · Social · Ads · SEO',\n        'services-heading':'End-to-End Digital Solutions for Your Business','cat-techsolution':'Tech Solution','cat-digitalmarketing':'Growth & Marketing',\n        'svc-techdev-title':'Tech Development','svc-techdev-desc':'Digital products that support business operations and deliver better customer experiences.',\n        'svc-techdev-sub1t':'Web Development','svc-techdev-sub1d':'Modern websites for brand presence and lead generation.',\n        'svc-techdev-sub2t':'Software Development','svc-techdev-sub2d':'Custom systems to simplify workflow and boost productivity.',\n        'svc-techdev-sub3t':'Mobile App Development','svc-techdev-sub3d':'Apps that connect your business with customers and services.',\n        'svc-ai-title':'AI Enablement','svc-ai-desc':'We help businesses use AI in practical ways — from chatbots and automation to smart recommendations and business insights. Integrate AI into websites, apps, and internal workflows to save time, reduce manual work, and make better decisions.',\n        'svc-ai-tag1':'AI Chatbots','svc-ai-tag2':'Automation','svc-ai-tag3':'Smart Recommendations','svc-ai-tag4':'Business Insights',\n        'svc-cyber-title':'Cyber Security','svc-cyber-desc':'Protect your digital assets with reliable cybersecurity across systems, networks, cloud, and endpoints. Grow digitally with confidence.',\n        'svc-cyber-b1':'Endpoint Security','svc-cyber-b2':'Network Security','svc-cyber-b3':'Cloud Security','svc-cyber-b4':'Data Protection','svc-cyber-b5':'Threat Prevention','svc-cyber-b6':'Monitoring & Mgmt',\n        'svc-dm1-title':'Creative & Brand Strategy','svc-dm1-desc':'Clear brand direction, campaign ideas, messaging, and digital communication strategies.',\n        'svc-dm2-title':'Social Media Strategy','svc-dm2-desc':'Build brand awareness, engagement, and stronger audience relationships through social.',\n        'svc-dm3-title':'Digital Advertising','svc-dm3-desc':'Reach the right audience through targeted digital ads focused on leads, traffic, and conversion.',\n        'svc-dm4-title':'SEO & GEO','svc-dm4-desc':'Improve visibility across search engines and AI-powered platforms to grow your reach.','svc-dm5-title':'Event & Production','svc-dm5-desc':'Beyond digital, Gastronot also supports offline marketing activities such as brand activation, product launches, exhibitions, roadshows, and community events.',\n        'partner-heading':'Building Solutions Together with Trusted Partners',\n        'partner-paragraph':'Gastronot collaborates with leading technology and solution providers to deliver the best digital outcomes for our clients — ensuring access to world-class tools, platforms, and expertise.',\n        'partner-b1-title':'Technology Partners','partner-b1-desc':'Access to cutting-edge platforms and infrastructure for every project.',\n        'partner-b2-title':'Security Partners','partner-b2-desc':'Leading cybersecurity vendors to protect your digital infrastructure.',\n        'partner-b3-title':'AI & Cloud Partners','partner-b3-desc':'Certified partnerships with AI and cloud providers for scalable solutions.',\n        'clients-heading':'Trusted by Growing Businesses',\n        'clients-paragraph':'We work with businesses that want to grow through technology, AI, and digital transformation — helping them build stronger digital systems and create better opportunities for growth.',\n        'contact-heading1':\"Let's Build Something\",'contact-heading2':'Great Together',\n        'contact-sub':\"Ready to transform your business? Reach out and let's talk about your next digital move.\",\n        'contact-wa-btn':'Contact Gastronot','contact-start-btn':'Start a Project',\n        'contact-email':'ayesa@gastronot.id','contact-phone':'0811 929 1696',\n        'contact-address':'Green Lake City Ruko Sentra Niaga\\nBlok I No.5, Jakarta Barat 11750',\n        'footer-copyright':'© 2025 Gastronot. All rights reserved.'\n      }\n    };\n  }\n\n  _defaultPartnerLogos() {\n    return [\n      { id:'p1', label:'Meta',          src:'uploads/Untitled design - 1-fedaeee9.png' },\n      { id:'p2', label:'Google Partner',src:'uploads/Untitled design - 3-2136cec2.png' },\n      { id:'p3', label:'M.TECH',        src:'uploads/Untitled design - 2-1228241a.png' },\n      { id:'p4', label:'neo digital',   src:'uploads/Untitled design - 4-b06fbbd5.png' },\n      { id:'p5', label:'Sentilabs',     src:'uploads/Untitled design - 5-b70b4236.png' },\n      { id:'p6', label:'dealin',        src:'uploads/Untitled design - 6-9dc283cd.png' },\n    ];\n  }\n\n  _defaultClientLogos() {\n    return [\n      { id:'c1',  label:'Anessa',       src:'uploads/Anessa.BEnPywlq_ZaA1YE.webp' },\n      { id:'c2',  label:'Astra Otoshop',src:'uploads/astraotoshop-white.png' },\n      { id:'c3',  label:'AstraPay',     src:'uploads/Astrapay.Cxb_usGO_ZMSxj9.webp' },\n      { id:'c4',  label:'BYD',          src:'uploads/byd.png' },\n      { id:'c5',  label:'Chery',        src:'uploads/Chery.png' },\n      { id:'c6',  label:'Daihatsu',     src:'uploads/daihatsu-white.png' },\n      { id:'c7',  label:'Danareksa',    src:'uploads/Danareksa.4WzfzwlI_Z1sKzsz.webp' },\n      { id:'c8',  label:'GIS Travel',   src:'uploads/GIS-Travel.png' },\n      { id:'c9',  label:'Indomaret',    src:'uploads/Indomaret.6ln6hhOL_FwY7q.webp' },\n      { id:'c10', label:'Jababeka',     src:'uploads/Jababeka.png' },\n      { id:'c11', label:'Lepas',        src:'uploads/Lepas-white.png' },\n      { id:'c12', label:'Mayora',       src:'uploads/Mayora.8XQSiE-G_dXGCf.webp' },\n      { id:'c13', label:'Mazda',        src:'uploads/Mazda.Dw_RDira_qDusO.webp' },\n      { id:'c14', label:'Peugeot',      src:'uploads/Peugeot.V-ppgNem_qJGci.webp' },\n      { id:'c15', label:'Pharos',       src:'uploads/Pharos.png' },\n      { id:'c16', label:'Saniter',      src:'uploads/Saniter.B8PUsUkx_QcUHB.webp' },\n      { id:'c17', label:'Sinarmas',     src:'uploads/sinarmas-white.png' },\n      { id:'c18', label:'Stella',       src:'uploads/Stella.C3VjrjbY_ZzhXlY.webp' },\n      { id:'c19', label:'Vinfast',      src:'uploads/Vinfast.png' },\n      { id:'c20', label:'Yupi',         src:'uploads/Yupi.png' },\n      { id:'c21', label:'Zalora',       src:'uploads/Zalora.BFKVW8sS_Zg7Y8e.webp' },\n    ];\n  }\n\n  _uid() { return 'l' + Date.now() + Math.random().toString(36).slice(2,6); }\n\n  // ── API sync ─────────────────────────────────────────────────────────────\n  _getToken() { return localStorage.getItem('gastronot_admin_token') || ''; }\n\n  _setAPIStatus(state) {\n    const dot = document.getElementById('cms-api-status');\n    if (!dot) return;\n    dot.style.background = state === 'ok' ? '#17ebd4' : state === 'err' ? '#ff4d6d' : '#a39cb5';\n    dot.title = state === 'ok' ? 'Terhubung ke server' : state === 'err' ? 'Gagal terhubung ke server' : 'Tidak ada token / offline';\n  }\n\n  async _syncToAPI(endpoint, data) {\n    const token = this._getToken();\n    if (!token) { this._setAPIStatus('none'); return; }\n    try {\n      const res = await fetch(endpoint, {\n        method: 'POST',\n        headers: { 'Content-Type': 'application/json', 'x-admin-token': token },\n        body: JSON.stringify(data)\n      });\n      this._setAPIStatus(res.ok ? 'ok' : 'err');\n      if (res.status === 401) alert('Token salah. Perbarui token dan coba lagi.');\n    } catch(e) {\n      this._setAPIStatus('err');\n      console.warn('API sync gagal (offline?):', e.message);\n    }\n  }\n\n  async _fetchFromAPI() {\n    try {\n      const [cmsRes, partnerRes, clientRes] = await Promise.all([\n        fetch('/api/cms'), fetch('/api/logos/partners'), fetch('/api/logos/clients')\n      ]);\n      if (cmsRes.ok) {\n        const data = await cmsRes.json();\n        if (data) {\n          const def = this._defaultTextData();\n          this._textData = { visibility:{...def.visibility,...(data.visibility||{})}, text:{...def.text,...(data.text||{})} };\n          localStorage.setItem('gastronot_cms_v1', JSON.stringify(this._textData));\n          document.querySelectorAll('[data-cms-key]').forEach(inp => {\n            const k = inp.getAttribute('data-cms-key');\n            if (this._textData.text[k] !== undefined) inp.value = this._textData.text[k];\n          });\n          ['hero','about','services','partner','clients','contact'].forEach(s =>\n            this._setToggleUI(s, this._textData.visibility[s] !== false));\n        }\n      }\n      if (partnerRes.ok) {\n        const data = await partnerRes.json();\n        if (data) { this._partnerLogos = data; localStorage.setItem('gastronot_partner_logos_v1', JSON.stringify(data)); this._buildPartnerList(); }\n      }\n      if (clientRes.ok) {\n        const data = await clientRes.json();\n        if (data) { this._clientLogos = data; localStorage.setItem('gastronot_client_logos_v1', JSON.stringify(data)); this._buildClientList(); }\n      }\n      this._setAPIStatus('ok');\n    } catch(e) {\n      console.info('Offline / standalone mode:', e.message);\n    }\n  }\n\n  _loadTextData() {\n    try {\n      const raw = localStorage.getItem('gastronot_cms_v1');\n      if (raw) {\n        const saved = JSON.parse(raw);\n        const def = this._defaultTextData();\n        return { visibility:{...def.visibility,...(saved.visibility||{})}, text:{...def.text,...(saved.text||{})} };\n      }\n    } catch(e) {}\n    return this._defaultTextData();\n  }\n\n  _loadPartnerLogos() {\n    try {\n      const raw = localStorage.getItem('gastronot_partner_logos_v1');\n      if (raw) return JSON.parse(raw);\n    } catch(e) {}\n    return this._defaultPartnerLogos();\n  }\n\n  _loadClientLogos() {\n    try {\n      const raw = localStorage.getItem('gastronot_client_logos_v1');\n      if (raw) return JSON.parse(raw);\n    } catch(e) {}\n    return this._defaultClientLogos();\n  }\n\n  _saveTextData() {\n    localStorage.setItem('gastronot_cms_v1', JSON.stringify(this._textData));\n    this._syncToAPI('/api/cms', this._textData);\n    this._showSaved();\n  }\n\n  _savePartnerLogos() {\n    localStorage.setItem('gastronot_partner_logos_v1', JSON.stringify(this._partnerLogos));\n    this._syncToAPI('/api/logos/partners', this._partnerLogos);\n    const el = document.getElementById('partner-count');\n    if (el) el.textContent = this._partnerLogos.length + ' logos';\n    this._showSaved();\n  }\n\n  _saveClientLogos() {\n    localStorage.setItem('gastronot_client_logos_v1', JSON.stringify(this._clientLogos));\n    this._syncToAPI('/api/logos/clients', this._clientLogos);\n    const el = document.getElementById('client-count');\n    if (el) el.textContent = this._clientLogos.length + ' logos';\n    this._showSaved();\n  }\n\n  _showSaved() {\n    const ind = document.getElementById('cms-saved-indicator');\n    if (ind) { ind.style.opacity='1'; clearTimeout(this._savedTimer); this._savedTimer = setTimeout(()=>{ ind.style.opacity='0'; }, 2000); }\n  }\n\n  _setToggleUI(section, visible) {\n    const btn = document.getElementById('toggle-'+section);\n    const dot = document.getElementById('dot-'+section);\n    if (btn) {\n      btn.style.background = visible ? 'rgba(23,235,212,0.1)' : 'rgba(163,156,181,0.07)';\n      btn.style.borderColor = visible ? 'rgba(23,235,212,0.25)' : 'rgba(163,156,181,0.15)';\n      btn.style.color = visible ? '#17ebd4' : '#a39cb5';\n      const d = btn.querySelector('div'); if (d) d.style.background = visible ? '#17ebd4' : '#a39cb5';\n      const s = btn.querySelector('span'); if (s) s.textContent = visible ? 'Visible' : 'Hidden';\n    }\n    if (dot) dot.style.background = visible ? '#17ebd4' : '#a39cb5';\n  }\n\n  // ── Logo card builder ──────────────────────────────────────────────────\n  _makeLogoCard(logo, type) {\n    const card = document.createElement('div');\n    card.className = 'logo-card';\n    card.dataset.logoId = logo.id;\n    card.style.animation = 'slideIn 0.2s ease';\n\n    // Preview\n    const preview = document.createElement('div');\n    preview.className = 'logo-preview';\n    const img = document.createElement('img');\n    img.src = logo.src; img.alt = logo.label;\n    img.onerror = () => { img.style.display='none'; };\n    preview.appendChild(img);\n    card.appendChild(preview);\n\n    // Label input\n    const label = document.createElement('input');\n    label.type = 'text'; label.value = logo.label;\n    label.className = 'adm-input';\n    label.style.cssText = 'flex:1;';\n    label.placeholder = 'Nama logo';\n    label.addEventListener('input', () => {\n      logo.label = label.value;\n      if (type === 'partner') this._savePartnerLogos();\n      else this._saveClientLogos();\n    });\n    card.appendChild(label);\n\n    // Change image button\n    const changeLabel = document.createElement('label');\n    changeLabel.className = 'adm-btn-sm';\n    changeLabel.textContent = 'Ganti';\n    changeLabel.style.cursor = 'pointer';\n    const fileInput = document.createElement('input');\n    fileInput.type = 'file'; fileInput.accept = 'image/*'; fileInput.style.display = 'none';\n    fileInput.addEventListener('change', (e) => {\n      const file = e.target.files[0]; if (!file) return;\n      const reader = new FileReader();\n      reader.onload = (ev) => {\n        try {\n          logo.src = ev.target.result;\n          img.src = ev.target.result; img.style.display = '';\n          if (type === 'partner') this._savePartnerLogos();\n          else this._saveClientLogos();\n        } catch(err) { alert('Gambar terlalu besar (maks ~500KB).'); }\n      };\n      reader.readAsDataURL(file);\n    });\n    changeLabel.appendChild(fileInput);\n    card.appendChild(changeLabel);\n\n    // Delete button\n    const delBtn = document.createElement('button');\n    delBtn.className = 'adm-btn-del'; delBtn.textContent = '✕'; delBtn.title = 'Hapus logo';\n    delBtn.addEventListener('click', () => {\n      if (!confirm('Hapus logo \"' + logo.label + '\"?')) return;\n      if (type === 'partner') {\n        this._partnerLogos = this._partnerLogos.filter(l => l.id !== logo.id);\n        this._savePartnerLogos();\n        this._buildPartnerList();\n      } else {\n        this._clientLogos = this._clientLogos.filter(l => l.id !== logo.id);\n        this._saveClientLogos();\n        this._buildClientList();\n      }\n    });\n    card.appendChild(delBtn);\n\n    return card;\n  }\n\n  _buildPartnerList() {\n    const list = document.getElementById('partner-logos-list');\n    if (!list) return;\n    list.innerHTML = '';\n    this._partnerLogos.forEach(logo => list.appendChild(this._makeLogoCard(logo, 'partner')));\n    const el = document.getElementById('partner-count');\n    if (el) el.textContent = this._partnerLogos.length + ' logos';\n  }\n\n  _buildClientList() {\n    const list = document.getElementById('client-logos-list');\n    if (!list) return;\n    list.innerHTML = '';\n    this._clientLogos.forEach(logo => list.appendChild(this._makeLogoCard(logo, 'client')));\n    const el = document.getElementById('client-count');\n    if (el) el.textContent = this._clientLogos.length + ' logos';\n  }\n\n  _showAddForm(type) {\n    const listId = type === 'partner' ? 'partner-logos-list' : 'client-logos-list';\n    const list = document.getElementById(listId);\n    if (!list) return;\n    // Remove existing add form if any\n    const existing = list.querySelector('.add-form');\n    if (existing) { existing.remove(); return; }\n\n    const form = document.createElement('div');\n    form.className = 'add-form logo-card';\n    form.style.cssText = 'border-color: rgba(94,23,235,0.4); animation: slideIn 0.2s ease;';\n\n    const preview = document.createElement('div');\n    preview.className = 'logo-preview';\n    preview.style.cssText = 'background:#160b33; border:2px dashed #291a54; cursor:pointer;';\n    const uploadIcon = document.createElement('div');\n    uploadIcon.innerHTML = '<svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"rgba(163,156,181,0.5)\" stroke-width=\"2\"><path d=\"M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4\"><\u002Fpath><polyline points=\"17 8 12 3 7 8\"><\u002Fpolyline><line x1=\"12\" y1=\"3\" x2=\"12\" y2=\"15\"><\u002Fline><\u002Fsvg>';\n    uploadIcon.style.cssText = 'display:flex;align-items:center;justify-content:center;width:100%;height:100%;';\n    preview.appendChild(uploadIcon);\n\n    const newImgPreview = document.createElement('img');\n    newImgPreview.style.cssText = 'max-height:38px;max-width:74px;object-fit:contain;display:none;';\n    preview.appendChild(newImgPreview);\n\n    const fileInput = document.createElement('input');\n    fileInput.type = 'file'; fileInput.accept = 'image/*'; fileInput.style.display = 'none';\n    let newSrc = '';\n    fileInput.addEventListener('change', (e) => {\n      const file = e.target.files[0]; if (!file) return;\n      const reader = new FileReader();\n      reader.onload = (ev) => {\n        newSrc = ev.target.result;\n        newImgPreview.src = newSrc; newImgPreview.style.display = 'block';\n        uploadIcon.style.display = 'none';\n      };\n      reader.readAsDataURL(file);\n    });\n    preview.addEventListener('click', () => fileInput.click());\n    form.appendChild(preview); form.appendChild(fileInput);\n\n    const labelInput = document.createElement('input');\n    labelInput.type = 'text'; labelInput.className = 'adm-input';\n    labelInput.style.flex = '1'; labelInput.placeholder = 'Nama logo (contoh: Nike)';\n    form.appendChild(labelInput);\n\n    const saveBtn = document.createElement('button');\n    saveBtn.className = 'adm-btn-sm';\n    saveBtn.style.cssText = 'background:rgba(94,23,235,0.15);border-color:rgba(94,23,235,0.4);color:#a89aff;';\n    saveBtn.textContent = 'Tambah';\n    saveBtn.addEventListener('click', () => {\n      if (!newSrc) { alert('Upload gambar terlebih dahulu.'); return; }\n      const newLogo = { id: this._uid(), label: labelInput.value || 'Logo baru', src: newSrc };\n      if (type === 'partner') {\n        this._partnerLogos.push(newLogo);\n        this._savePartnerLogos();\n        this._buildPartnerList();\n      } else {\n        this._clientLogos.push(newLogo);\n        this._saveClientLogos();\n        this._buildClientList();\n      }\n    });\n    form.appendChild(saveBtn);\n\n    const cancelBtn = document.createElement('button');\n    cancelBtn.className = 'adm-btn-del'; cancelBtn.textContent = '✕'; cancelBtn.title = 'Batal';\n    cancelBtn.addEventListener('click', () => form.remove());\n    form.appendChild(cancelBtn);\n\n    list.appendChild(form);\n    form.scrollIntoView({ behavior: 'smooth', block: 'nearest' });\n  }\n\n  componentDidMount() {\n    this._textData    = this._loadTextData();\n    this._partnerLogos = this._loadPartnerLogos();\n    this._clientLogos  = this._loadClientLogos();\n\n    // Wire API token input\n    const tokenInput = document.getElementById('cms-token-input');\n    const tokenSave  = document.getElementById('cms-token-save');\n    if (tokenInput) tokenInput.value = this._getToken();\n    if (tokenSave) tokenSave.addEventListener('click', () => {\n      const v = tokenInput ? tokenInput.value.trim() : '';\n      localStorage.setItem('gastronot_admin_token', v);\n      this._fetchFromAPI();\n      this._showSaved();\n    });\n\n    // Fetch fresh data from API server (non-blocking)\n    this._fetchFromAPI();\n\n    // Wire text inputs\n    document.querySelectorAll('[data-cms-key]').forEach(input => {\n      const key = input.getAttribute('data-cms-key');\n      if (this._textData.text[key] !== undefined) input.value = this._textData.text[key];\n      input.addEventListener('input', (e) => { this._textData.text[key] = e.target.value; this._saveTextData(); });\n    });\n\n    // Wire toggles\n    document.querySelectorAll('[data-toggle-section]').forEach(btn => {\n      const section = btn.getAttribute('data-toggle-section');\n      this._setToggleUI(section, this._textData.visibility[section] !== false);\n      btn.addEventListener('click', () => {\n        this._textData.visibility[section] = !this._textData.visibility[section];\n        this._saveTextData();\n        this._setToggleUI(section, this._textData.visibility[section]);\n      });\n    });\n\n    // Build logo lists\n    this._buildPartnerList();\n    this._buildClientList();\n\n    // Add logo buttons\n    const addPartnerBtn = document.getElementById('add-partner-btn');\n    if (addPartnerBtn) addPartnerBtn.addEventListener('click', () => this._showAddForm('partner'));\n\n    const addClientBtn = document.getElementById('add-client-btn');\n    if (addClientBtn) addClientBtn.addEventListener('click', () => this._showAddForm('client'));\n\n    // Reset button\n    const resetBtn = document.getElementById('cms-reset-btn');\n    if (resetBtn) {\n      resetBtn.addEventListener('click', () => {\n        if (confirm('Reset semua konten ke default? Ini tidak bisa di-undo.')) {\n          this._textData = this._defaultTextData();\n          this._partnerLogos = this._defaultPartnerLogos();\n          this._clientLogos = this._defaultClientLogos();\n          this._saveTextData();\n          this._savePartnerLogos();\n          this._saveClientLogos();\n          document.querySelectorAll('[data-cms-key]').forEach(input => {\n            const key = input.getAttribute('data-cms-key');\n            input.value = this._textData.text[key] || '';\n          });\n          ['hero','about','services','partner','clients','contact'].forEach(s => this._setToggleUI(s, true));\n          this._buildPartnerList();\n          this._buildClientList();\n        }\n      });\n    }\n  }\n\n  componentWillUnmount() { clearTimeout(this._savedTimer); }\n  renderVals() { return {}; }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
